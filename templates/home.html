{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>
</head>
<body>

    <div class="auth-bar" style="display: flex; justify-content: flex-end; align-items: center; gap: 1rem; font-size: 0.9rem; margin-bottom: 2rem; color: var(--text-muted);">
        <button id="theme-toggle" class="btn-auth-outline" style="padding: 0.35rem 0.75rem; border-radius: 20px;" aria-label="Toggle theme">
            ☀️ Light Mode
        </button>
        {% if request.user.is_authenticated %}
        <a href="{% url 'dashboard' %}" class="btn-auth">Account</a>
        <form action="{% url 'logout' %}" method="POST" style="display: inline; margin: 0; padding: 0;">
            {% csrf_token %}
            <button type="submit" class="btn-auth-outline">Logout</button>
        </form>
        {% else %}
        <a href="{% url 'login' %}" class="btn-auth">Login</a>
        <a href="{% url 'signup' %}" class="btn-auth">Sign Up</a>
        {% endif %}
    </div>

    <!-- Centered hero layout to fill empty space beautifully -->
    <div class="home-container">
        <main style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 2.2rem; margin-bottom: 0.5rem; font-weight: 700;">URL Shortener</h1>
            <p style="color: var(--text-muted); margin-bottom: 2.5rem; font-size: 1.05rem;">Turn long, messy links into short, beautiful URLs and secure QR codes.</p>

            <form id="shorten-form" class="shortener-form">
                {% csrf_token %}
                <div class="input-wrapper">
                    <input 
                        type="url" 
                        name="original_url" 
                        id="url-input" 
                        class="url-input" 
                        placeholder="Paste your long URL here..." 
                        required
                    >
                </div>
                <button type="submit" id="submit-btn" class="btn-primary">
                    <span id="btn-text">Shorten URL</span>
                </button>
                <button type="button" id="qr-submit-btn" class="btn-primary" style="background-color: transparent; color: var(--text-color); border: 1px solid var(--border-color);">
                    <span id="qr-btn-text">Create QR</span>
                </button>
            </form>
        </main>
    </div>

    <!-- Modal for QR Code Display -->
    <div id="qr-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>QR Code</h3>
                <div style="display: flex; gap: 0.75rem;">
                    <button id="download-qr-btn" class="modal-close" style="text-decoration: underline;">Download</button>
                    <button id="close-modal" class="modal-close">Close</button>
                </div>
            </div>
            <div class="qr-container">
                <img id="qr-image" src="" alt="QR Code">
            </div>
            <p class="qr-link-text" id="qr-link"></p>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
