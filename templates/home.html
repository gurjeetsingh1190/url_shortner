<!DOCTYPE html>

<html>

<head>

    <title>URL Shortener</title>

</head>

<body>

    <h1>URL Shortener</h1>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">

            Shorten

        </button>

    </form>

    {% if short_url %}

    <h3>Your Short URL</h3>

    <a href="{{ short_url }}">

        {{ short_url }}

    </a>

    {% endif %}

</body>

</html>
