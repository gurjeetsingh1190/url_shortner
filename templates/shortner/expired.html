{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Expired - URL Shortener</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>
</head>
<body>
    <header class="glass-header">
        <div class="header-content">
            <a href="{% url 'home' %}" class="logo-link">
                <i class="ph ph-link"></i> Shortener
            </a>
            <div class="auth-bar">
                <button id="theme-toggle" class="icon-btn tooltip-trigger" aria-label="Toggle theme">
                    <i class="ph ph-sun"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="home-container" style="display: flex; align-items: center; justify-content: center; min-height: 70vh;">
        <div class="glass-panel" style="max-width: 450px; width: 100%; text-align: center;">
            <div style="font-size: 3rem; color: #e74c3c; margin-bottom: 1rem;">
                <i class="ph ph-clock-countdown"></i>
            </div>
            <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Link Expired</h1>
            <p style="margin-bottom: 2rem; color: var(--text-muted);">This URL has passed its expiration date and is no longer available.</p>
            
            <a href="{% url 'home' %}" class="btn-primary" style="display: inline-block; padding: 0.8rem 2rem; text-decoration: none;">
                Go Home
            </a>
        </div>
    </main>

    <script>
        const themeBtn = document.getElementById('theme-toggle');
        const themeIcon = themeBtn.querySelector('i');
        function updateIcon(isLight) { themeIcon.className = isLight ? 'ph ph-moon' : 'ph ph-sun'; }
        if (document.documentElement.classList.contains('light-theme')) updateIcon(true);
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('light-theme');
            const isLight = document.documentElement.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateIcon(isLight);
        });
    </script>
</body>
</html>
