{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protected Link - URL Shortener</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>
</head>
<body>
    <header class="glass-header">
        <div class="header-content">
            <a href="{% url 'home' %}" class="logo-link">
                <i class="ph ph-link"></i> Shortener
            </a>
            <div class="auth-bar">
                <button id="theme-toggle" class="icon-btn tooltip-trigger" aria-label="Toggle theme">
                    <i class="ph ph-sun"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="home-container" style="display: flex; align-items: center; justify-content: center; min-height: 70vh;">
        <div class="glass-panel" style="max-width: 450px; width: 100%; text-align: center;">
            <div style="font-size: 3rem; color: var(--text-muted); margin-bottom: 1rem;">
                <i class="ph ph-lock-key"></i>
            </div>
            <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Protected Link</h1>
            <p style="margin-bottom: 2rem; color: var(--text-muted);">This link is password protected.</p>
            
            <form method="POST" class="shortener-form" style="display: flex; flex-direction: column; gap: 1rem; text-align: left;">
                {% csrf_token %}
                
                {% if error %}
                <div style="color: #e74c3c; font-size: 0.9rem; padding: 0.75rem; background: rgba(231, 76, 60, 0.1); border-radius: 8px; text-align: center;">
                    {{ error }}
                </div>
                {% endif %}
                
                <div style="display: flex; flex-direction: column; gap: 0.25rem;">
                    <input type="password" name="password" id="password" class="glass-input" placeholder="Enter Password" required autofocus>
                </div>
                
                <button type="submit" class="btn-primary" style="margin-top: 1rem; width: 100%; padding: 0.8rem; border: none; font-size: 1rem; cursor: pointer;">
                    Unlock Link
                </button>
            </form>
        </div>
    </main>

    <script>
        const themeBtn = document.getElementById('theme-toggle');
        const themeIcon = themeBtn.querySelector('i');
        function updateIcon(isLight) { themeIcon.className = isLight ? 'ph ph-moon' : 'ph ph-sun'; }
        if (document.documentElement.classList.contains('light-theme')) updateIcon(true);
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('light-theme');
            const isLight = document.documentElement.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateIcon(isLight);
        });
    </script>
</body>
</html>
